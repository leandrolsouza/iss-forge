name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              draft: true,
              prerelease: tag.includes('beta') || tag.includes('alpha'),
              generate_release_notes: true,
            });
            core.setOutput('release_id', String(release.id));

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Electron app
        run: |
          npm run build
          npx electron-builder --win --publish never

      - name: Upload assets to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const releaseDir = path.join(process.env.GITHUB_WORKSPACE, 'release');
            const files = fs.readdirSync(releaseDir).filter(f => {
              return f.endsWith('.exe') || f.endsWith('.blockmap') || f === 'latest.yml';
            });
            for (const file of files) {
              const filePath = path.join(releaseDir, file);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) continue;
              console.log(`Uploading ${file} (${stat.size} bytes)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath),
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': stat.size,
                },
              });
            }

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Electron app
        run: |
          npm run build
          npx electron-builder --mac --publish never

      - name: Upload assets to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const releaseDir = path.join(process.env.GITHUB_WORKSPACE, 'release');
            const files = fs.readdirSync(releaseDir).filter(f => {
              return f.endsWith('.dmg') || f.endsWith('.zip') || f.endsWith('.blockmap') || f === 'latest-mac.yml';
            });
            for (const file of files) {
              const filePath = path.join(releaseDir, file);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) continue;
              console.log(`Uploading ${file} (${stat.size} bytes)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath),
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': stat.size,
                },
              });
            }

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Electron app
        run: |
          npm run build
          npx electron-builder --linux --publish never

      - name: Upload assets to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const releaseDir = path.join(process.env.GITHUB_WORKSPACE, 'release');
            const files = fs.readdirSync(releaseDir).filter(f => {
              return f.endsWith('.AppImage') || f.endsWith('.deb') || f.endsWith('.blockmap') || f === 'latest-linux.yml';
            });
            for (const file of files) {
              const filePath = path.join(releaseDir, file);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) continue;
              console.log(`Uploading ${file} (${stat.size} bytes)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath),
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': stat.size,
                },
              });
            }

  publish-release:
    needs: [create-release, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
